services:
  app:
    image: ${APP_IMAGE:-huawei-inspection-backend:latest}
    build: .
    container_name: huawei-inspection-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_ROOT: /app/data
      TEMPLATE_DIR: /app/assets/templates
      REPORT_CONFIG_PATH: /app/config/report.json
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8080/api/health", timeout=3).read()
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
