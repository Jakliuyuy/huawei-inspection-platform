services:
  app:
    build: .
    container_name: huawei-inspection-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_ROOT: /app/data
      TEMPLATE_DIR: /app/assets/templates
      REPORT_CONFIG_PATH: /app/config/report.json
    volumes:
      - ./data:/app/data
    expose:
      - "8080"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: huawei-inspection-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
